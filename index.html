<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Sim V2 — Load Ramp</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Config bar -->
    <div id="config-bar">
      <div class="config-group">
        <label>From (MW)
          <input type="number" id="fromMw" value="100" step="10" />
        </label>
        <label>To (MW)
          <input type="number" id="toMw" value="200" step="10" />
        </label>
        <label>Duration (s)
          <input type="number" id="durationSec" value="10" step="1" min="0.1" />
        </label>
      </div>
      <div class="btn-group">
        <button id="btnStart" class="btn btn-primary">Start</button>
        <button id="btnPause" class="btn" disabled>Pause</button>
        <button id="btnRestart" class="btn btn-danger" disabled>Restart</button>
      </div>
    </div>

    <!-- Chart -->
    <div id="chart-container">
      <canvas id="chartCanvas"></canvas>
    </div>

    <!-- Data table -->
    <div id="table-container">
      <table id="dataTable">
        <thead>
          <tr id="tableHeader">
            <th>Time (s)</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <button id="btnExportCsv" class="btn" disabled>Export CSV</button>
      <button id="btnSave" class="btn" disabled>Save Session</button>
      <div class="select-group">
        <label>Load:
          <select id="loadSelect">
            <option value="">— saved sessions —</option>
          </select>
        </label>
        <button id="btnLoad" class="btn" disabled>Load</button>
        <button id="btnDelete" class="btn btn-danger" disabled>Delete</button>
      </div>
    </div>
  </div>

  <script src="LoadRamp.js"></script>
  <script src="TimeSeries.js"></script>
  <script src="Persister.js"></script>
  <script src="app.js"></script>
</body>
</html>
